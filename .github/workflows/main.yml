name: Build App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npx electron-builder --win --x64
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: LyraOS-App
          path: dist/*.exe
