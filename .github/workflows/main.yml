name: Build App
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - run: npm run make
      - uses: actions/upload-artifact@v4
        with:
          name: LyraOS-App
          path: out/make/**/*.exe
